discourse:
  kubeVersion: "1.19"
  image:
    repository: bitnamilegacy/discourse
  volumePermissions:
    image:
      repository: bitnamilegacy/bitnami-shell
  auth:
    username: devops
    email: devops@hasadna.org.il
    existingSecret: discourse-passwords
  host: forum.hasadna.org.il
  smtp:
    enabled: true
    host: smtp.mailgun.org
    port: 587
    existingSecret: discourse-passwords
    user: forum@hasadna.org.il
  discourse:
    skipInstall: true
    resources:
      requests:
        cpu: "100m"
        memory: "512Mi"
      limits:
        memory: "1500Mi"
  sidekiq:
    resources:
      requests:
        cpu: "25m"
        memory: "256Mi"
      limits:
        memory: "1000Mi"
  persistence:
    enabled: true
    existingClaim: "discourse2"
  ingress:
    enabled: true
    annotations:
      kubernetes.io/ingress.class: "nginx"
      cert-manager.io/cluster-issuer: letsencrypt
    apiVersion: networking.k8s.io/v1
    hostname: forum.hasadna.org.il
    tls: true
    # extraTls:
    #   - hosts:
    #       - forum.hasadna.org.il
    #     secretName: forum.hasadna.org.il-tls
#  volumePermissions:
#    enabled: true
  postgresql:
    image:
      repository: bitnamilegacy/postgresql
    kubeVersion: "1.19"
    auth:
      existingSecret: discourse-passwords
      database: discourse
    primary:
      persistence:
        existingClaim: "postgres2"
      resources:
        requests:
          memory: 256Mi
          cpu: 50m
        limits:
          memory: "500Mi"
  redis:
    image:
      tag: latest
    kubeVersion: "1.19"
    auth:
      enabled: false
    master:
      persistence:
        existingClaim: "redis3"
      resources:
        requests:
          cpu: "25m"
          memory: "100Mi"
        limits:
          memory: "300Mi"

secrets:
  - name: discourse-passwords
    data:
      discourse-password: "~vault:Projects/hasadna-forum/admin:password~"
      smtp-password: "~vault:Projects/hasadna-forum/smtp:password~"
      postgres-password: "~vault:Projects/hasadna-forum/db:password-admin~"
      replication-password: "~vault:Projects/hasadna-forum/db:password-replication~"
      password: "~vault:Projects/hasadna-forum/db:password-user~"
