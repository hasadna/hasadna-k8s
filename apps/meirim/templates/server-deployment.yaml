apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
spec:
  selector:
    matchLabels:
      app: server
  replicas: 2
  template:
    metadata:
      labels:
        app: server
    spec:
      containers:
      - name: server
        image: {{ .Values.serverImage | quote }}
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "1"
            memory: "2Gi"
        env:
          - name: SERVER_DATABASE_HOST
            value: "meirim-mariadb"
        envFrom:
          - secretRef:
              name: meirim-server-env
          - configMapRef:
              name: hasadna-proxy1
