apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
spec:
  selector:
    matchLabels:
      app: client
  replicas: 2
  template:
    metadata:
      labels:
        app: client
    spec:
      containers:
      - name: client
        image: {{ .Values.clientImage | quote }}
        resources:
          requests:
            cpu: "250m"
            memory: "500Mi"
          limits:
            cpu: "1"
            memory: "1Gi"
