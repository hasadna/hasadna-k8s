apiVersion: apps/v1
kind: Deployment
metadata:
  name: out-of-order
spec:
  replicas: 1
  selector:
    matchLabels:
      app: out-of-order
  template:
    metadata:
      labels:
        app: out-of-order
    spec:
      initContainers:
        - name: init
          image: python:3.12-alpine
          command:
            - python
            - -c
            - |
              import json
              sites = {{ .Values.outOfOrder | toJson }}
{{ .Files.Get "files/out_of_order_init.py" | indent 14 }}
          volumeMounts:
            - name: confd
              mountPath: /etc/nginx/conf.d
            - name: varwww
              mountPath: /var/www
      containers:
        - name: nginx
          image: nginx:alpine
          volumeMounts:
            - name: confd
              mountPath: /etc/nginx/conf.d
            - name: varwww
              mountPath: /var/www
      volumes:
        - name: confd
          emptyDir: {}
        - name: varwww
          emptyDir: {}
