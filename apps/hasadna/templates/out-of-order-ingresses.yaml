{{ range .Values.outOfOrder }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: "{{ .name }}-ooo"
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
spec:
  rules:
  - host: {{ .host | quote }}
    http:
      paths:
      - path: "/"
        pathType: ImplementationSpecific
        backend:
          service:
            name: out-of-order
            port:
              number: 80
  tls:
  - hosts:
    - {{ .host | quote }}
    secretName: {{ .name }}-redirect-cert
---
{{ end }}
