apiVersion: v1
kind: ServiceAccount
metadata:
  name: argo-admin
  annotations:
    workflows.argoproj.io/rbac-rule: "'hasadna:argocd-admins' in groups"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-admin
rules:
  - verbs: [create, get, update, delete, patch, list, watch]
    apiGroups: ["argoproj.io"]
    resources: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argo-admin
subjects:
- kind: ServiceAccount
  name: argo-admin
  namespace: argo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argo-admin
rules:
  - verbs: [create, get, update, delete, patch, list, watch]
    apiGroups: ["argoproj.io"]
    resources: ["*"]
  - verbs: [get, list, watch]
    apiGroups: [""]
    resources: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argo-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argo-admin
subjects:
- kind: ServiceAccount
  name: argo-admin
  namespace: argo
