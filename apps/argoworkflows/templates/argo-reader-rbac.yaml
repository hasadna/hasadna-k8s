{{ range $name, $group := .Values.argoworkflowAdminGroups }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argo-{{ $name }}-admin
  annotations:
    workflows.argoproj.io/rbac-rule: {{ $group.rbacRule | quote }}
---
{{ range $namespace := $group.namespaces }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-{{ $name }}-admin
  namespace: {{ $namespace }}
rules:
  - verbs: [get, list, watch, create, update, delete, patch]
    apiGroups: ["argoproj.io"]
    resources: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-{{ $name }}-admin
  namespace: {{ $namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argo-{{ $name }}-admin
subjects:
- kind: ServiceAccount
  name: argo-{{ $name }}-admin
  namespace: argo
---
{{ end }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argo-{{ $name }}-admin
rules:
  - verbs: [list, watch]
    apiGroups: ["argoproj.io"]
    resources: ["workflows", "workflowtemplates", "cronworkflows", "workflowevents"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argo-{{ $name }}-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argo-{{ $name }}-admin
subjects:
- kind: ServiceAccount
  name: argo-{{ $name }}-admin
  namespace: argo
---
apiVersion: v1
kind: Secret
metadata:
  name: argo-{{ $name }}-admin.service-account-token
  annotations:
    kubernetes.io/service-account.name: argo-{{ $name }}-admin
type: kubernetes.io/service-account-token
---
{{ end }}
