{{- if .Values.uptimeSentinel.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kured-uptime-sentinel
  labels:
    app.kubernetes.io/name: kured-uptime-sentinel
    app.kubernetes.io/part-of: kured
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: kured-uptime-sentinel
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kured-uptime-sentinel
        app.kubernetes.io/part-of: kured
    spec:
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/os: linux
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      containers:
        - name: uptime-sentinel
          image: {{ .Values.uptimeSentinel.image | quote }}
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              sentinel=/host/var-run/kured-reboot-required

              while true; do
                uptime_seconds="$(cut -d. -f1 /host/proc/uptime)"

                if [ "${uptime_seconds}" -ge "${REBOOT_REQUIRED_UPTIME_SECONDS}" ]; then
                  touch "${sentinel}"
                  state=present
                else
                  rm -f "${sentinel}"
                  state=absent
                fi

                printf '%s kured reboot sentinel %s: uptime=%ss threshold=%ss\n' \
                  "$(date -u '+%Y-%m-%dT%H:%M:%SZ')" \
                  "${state}" \
                  "${uptime_seconds}" \
                  "${REBOOT_REQUIRED_UPTIME_SECONDS}"

                sleep "${CHECK_INTERVAL_SECONDS}"
              done
          env:
            - name: CHECK_INTERVAL_SECONDS
              value: {{ .Values.uptimeSentinel.checkIntervalSeconds | quote }}
            - name: REBOOT_REQUIRED_UPTIME_SECONDS
              value: {{ .Values.uptimeSentinel.rebootRequiredUptimeSeconds | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsUser: 0
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              memory: 32Mi
          volumeMounts:
            - name: host-proc
              mountPath: /host/proc
              readOnly: true
            - name: host-var-run
              mountPath: /host/var-run
      volumes:
        - name: host-proc
          hostPath:
            path: /proc
            type: Directory
        - name: host-var-run
          hostPath:
            path: /var/run
            type: Directory
{{- end }}
