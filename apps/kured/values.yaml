kured:
  configuration:
    # Add kured annotations to nodes during reboot operations for visibility.
    annotateNodes: true
    # Reboot at most one node at a time to preserve cluster availability.
    concurrency: 1
    # Abort draining a node if pods do not evict within 30 minutes.
    drainTimeout: "30m"
    # force a reboot even if the drain fails or times out
    forceReboot: true
    # Emit structured logs for easier querying in Loki.
    logFormat: json
    # Taint a node while it is pending reboot to avoid scheduling new pods there.
    preferNoScheduleTaint: weave.works/kured-node-reboot
    # Check Prometheus for active alerts before rebooting nodes.
    # prometheusUrl: http://monitoring-kube-prometheus-prometheus.monitoring:9090
    # Use a host file managed by the uptime sentinel DaemonSet to avoid noisy command checks.
    useRebootSentinelHostPath: true
    rebootSentinel: /var/run/kured-reboot-required
    # Check for reboot every 1 hour
    period: "1h"
    # Force-clear stale reboot locks if a kured pod exits before releasing them.
    lockTtl: "6h"
    # Interpret the reboot window using Israel local time.
    timeZone: Asia/Jerusalem
    # Only start reboots after 02:00 local time.
    startTime: "02:00"
    # Stop starting new reboots after 06:00 local time.
    endTime: "06:00"
    # after a node is rebooted, wait until another node can be rebooted
    lockReleaseDelay: "12h"

  metrics:
    create: true
    namespace: monitoring

  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 128Mi

  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
    - key: node-role.kubernetes.io/master
      operator: Exists
      effect: NoSchedule
    - key: CriticalAddonsOnly
      operator: Exists
      effect: NoExecute

uptimeSentinel:
  enabled: true
  image: busybox:1.36
  checkIntervalSeconds: "21600"  # 6 hours
  rebootRequiredUptimeSeconds: "2592000"  # 30 days
