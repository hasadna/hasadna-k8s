---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vpa-recommender
  namespace: kube-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vpa-recommender
  namespace: kube-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vpa-recommender
  template:
    metadata:
      labels:
        app: vpa-recommender
    spec:
      serviceAccountName: vpa-recommender
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534 # nobody
      containers:
      - name: recommender
        image: k8s.gcr.io/autoscaling/vpa-recommender:0.8.1
        imagePullPolicy: Always
        resources:
          limits:
            memory: 600Mi
          requests:
            cpu: 25m
            memory: 256Mi
        ports:
        - containerPort: 8080
